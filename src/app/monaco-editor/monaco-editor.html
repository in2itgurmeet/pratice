<div class="monaco-editor-container">
  <div class="editor-header">
    <h1>Monaco Editor</h1>
  </div>

  <!-- Toolbar -->
  <div class="editor-toolbar">
    <!-- Theme Selector -->
    <div class="toolbar-group">
      <label for="theme-select">Theme:</label>
      <select id="theme-select" [(ngModel)]="currentTheme" (change)="onThemeChange(currentTheme)" class="select-input">
        <option *ngFor="let theme of themes" [value]="theme.value">{{ theme.name }}</option>
      </select>
    </div>

    <!-- Language Selector -->
    <div class="toolbar-group">
      <label for="language-select">Language:</label>
      <select id="language-select" [(ngModel)]="currentLanguage" (change)="onLanguageChange(currentLanguage)" class="select-input">
        <option *ngFor="let lang of languages" [value]="lang.value">{{ lang.name }}</option>
      </select>
    </div>

    <!-- Font Size -->
    <div class="toolbar-group">
      <label for="font-size">Font Size:</label>
      <input type="range" id="font-size" min="10" max="30" [(ngModel)]="fontSize" (change)="onFontSizeChange(fontSize)" class="range-input" />
      <span class="value-display">{{ fontSize }}px</span>
    </div>

    <!-- Word Wrap -->
    <div class="toolbar-group">
      <label for="word-wrap">Word Wrap:</label>
      <select id="word-wrap" [(ngModel)]="wordWrap" (change)="onWordWrapChange(wordWrap)" class="select-input">
        <option value="off">Off</option>
        <option value="on">On</option>
        <option value="wordWrapColumn">At Column</option>
      </select>
    </div>

    <!-- Checkboxes -->
    <div class="toolbar-group checkbox-group">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="showLineNumbers" (change)="onLineNumbersChange(showLineNumbers)" />
        Line Numbers
      </label>
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="showMinimap" (change)="onMinimapChange(showMinimap)" />
        Minimap
      </label>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button (click)="copyToClipboard()" class="btn btn-copy" title="Copy to clipboard">
      <span class="icon">📋</span> Copy
    </button>
    <button (click)="downloadCode()" class="btn btn-download" title="Download code">
      <span class="icon">⬇️</span> Download
    </button>
    <button (click)="uploadCode()" class="btn btn-upload" [disabled]="isUploading" title="Upload code">
      <span class="icon">⬆️</span> {{ isUploading ? 'Uploading...' : 'Upload' }}
    </button>
    <button (click)="clearCode()" class="btn btn-clear" title="Clear editor">
      <span class="icon">🗑️</span> Clear
    </button>
    <button (click)="resetSettings()" class="btn btn-reset" title="Reset settings">
      <span class="icon">🔄</span> Reset
    </button>
  </div>

  <!-- Copy Message -->
  <div *ngIf="copyMessage" class="copy-message" [ngClass]="{ 'success': copyMessage.includes('copied'), 'error': copyMessage.includes('Failed') }">
    {{ copyMessage }}
  </div>

  <!-- Upload Progress -->
  <div *ngIf="isUploading" class="upload-progress">
    <div class="progress-bar" [style.width.%]="uploadProgress"></div>
    <span class="progress-text">{{ uploadProgress.toFixed(0) }}%</span>
  </div>

  <!-- Monaco Editor -->
  <div class="editor-wrapper">
    <ngx-monaco-editor [(ngModel)]="code" [options]="editorOptions" class="editor"></ngx-monaco-editor>
  </div>

  <!-- Code Info -->
  <div class="code-info">
    <span>Lines: {{ code.split('\n').length }}</span>
    <span>Characters: {{ code.length }}</span>
    <span>Language: {{ currentLanguage }}</span>
  </div>
</div>
