<div class="col-6" style="margin: 0 auto; width: 60%">
  <div class="wrapper_modal">
    <!-- Header Section -->
    <div class="upper_section">
      <div class="progress_bar">
        <div class="border_top"></div>
      </div>

      <div class="model_header">
        <div class="modal_title">
          <span class="title_text">Create Scheduler</span>
          <span class="badge blue">Step 1: Scheduler Details</span>
        </div>

        <div class="icons_details">
          <img
            src="assets/svg-icon/expand-screen.svg"
            alt="expand screen"
            class="cursor-pointer"
          />
        </div>
      </div>
    </div>

    <!-- Form Section -->
    <div class="middle_section">
      <div class="body_header">
        <span class="body_header_title">Scheduler Details</span>
        <span class="body_header_subtitle">
          Kindly fill out scheduler details to create scheduler
        </span>
      </div>

      <form class="form_section d-flex" [formGroup]="schedulerDetailsForm">
        <!-- Left Side -->
        <div class="left_side">
          <!-- Operation Field -->
          <div class="row_div d-flex align-items-center">
            <label for="operation">
              Operation <sup class="red">*</sup>
            </label>
            <div class="flex-fill">
              <cats-ui-single-select
                id="operation"
                [optionList]="operationList"
                [singleSelectConfig]="singleConfig"
                formControlName="operation"
                [parentNativeElement]="'parent'"
              >
              </cats-ui-single-select>
            </div>
          </div>

          <!-- Schedule By Field -->
          <div class="row_div d-flex align-items-center">
            <label for="scheduleBy">
              Schedule By <sup class="red">*</sup>
            </label>
            <div class="flex-fill">
              <cats-ui-single-select
                id="scheduleBy"
                [optionList]="scheduleByOptions"
                [singleSelectConfig]="singleConfig"
                formControlName="scheduleBy"
                [parentNativeElement]="'parent'"
              >
              </cats-ui-single-select>
            </div>
          </div>

          <!-- Target Field -->
          <div class="row_div d-flex align-items-center">
            <label for="target">
              Target <sup class="red">*</sup>
            </label>
            <div class="flex-fill">
              <cats-ui-single-select
                id="target"
                [optionList]="targetOptions"
                [singleSelectConfig]="singleConfig"
                formControlName="target"
                [parentNativeElement]="'parent'"
              >
              </cats-ui-single-select>
            </div>
          </div>

          <!-- Device Group Field -->
          <div class="row_div d-flex align-items-center">
            <label for="deviceGroup">
              Device Group <sup class="red">*</sup>
            </label>
            <div class="flex-fill">
              <cats-ui-single-select
                id="deviceGroup"
                [optionList]="deviceGroupOptions"
                [singleSelectConfig]="singleConfig"
                formControlName="deviceGroup"
                [parentNativeElement]="'parent'"
              >
              </cats-ui-single-select>
            </div>
          </div>

          <!-- Schedule Name Field -->
          <div class="row_div d-flex align-items-center">
            <label for="scheduleName">
              Schedule Name <sup class="red">*</sup>
            </label>
            <div class="flex-fill">
              <cats-ui-input
                id="scheduleName"
                [inputConfig]="inputConfig"
                required
                formControlName="scheduleName"
              >
              </cats-ui-input>
            </div>
          </div>

          <!-- Capture Start Date Section -->
          <div class="row_div d-flex">
            <label class="pt-10px">
              Capture Start Date <sup class="red">*</sup>
            </label>
            <div class="add_plus_input flex-fill">
              <div class="w-100">
                <cats-ui-custom-date-picker
                  [config]="{
                    mode: 'single',
                    time: false,
                    parentDateFormat: 'MM/dd/yyyy'
                  }"
                  formControlName="captureStartDate"
                  (applied)="displayDataStart($event)"
                >
                </cats-ui-custom-date-picker>
              </div>
              <div class="d-flex gap-8px w-100">
                <div class="w-50">
                  <cats-ui-input
                    [inputConfig]="baseInputConfig"
                    formControlName="startTime"
                  >
                  </cats-ui-input>
                </div>
                <div class="w-50">
                  <cats-ui-input
                    [inputConfig]="inputConfig"
                    formControlName="startTimeValue"
                  >
                  </cats-ui-input>
                </div>
              </div>
            </div>
          </div>

          <!-- Capture End Date Section -->
          <div class="row_div d-flex">
            <label class="pt-10px">
              Capture End Date <sup class="red">*</sup>
            </label>
            <div class="add_plus_input flex-fill">
              <div class="radio_btn">
                <cats-ui-radio-button
                  [config]="radioConfig"
                  [optionList]="optionsRadio"
                  [selectedRadio]="1"
                  formControlName="captureEndDateRadio"
                  (selectionChange)="onRadio($event)"
                >
                </cats-ui-radio-button>
              </div>

              <!-- Conditional End Date Fields -->
              @if (captureEndDate) {
                <div class="w-100">
                  <cats-ui-custom-date-picker
                    [config]="{
                      mode: 'single',
                      time: false,
                      parentDateFormat: 'MM/dd/yyyy'
                    }"
                    formControlName="captureEndDate"
                    (applied)="displayDataEnd($event)"
                  >
                  </cats-ui-custom-date-picker>
                </div>
                <div class="d-flex gap-8px w-100">
                  <div class="w-50">
                    <cats-ui-input
                      [inputConfig]="baseInputConfig"
                      formControlName="endTime"
                    >
                    </cats-ui-input>
                  </div>
                  <div class="w-50">
                    <cats-ui-input
                      [inputConfig]="inputConfig"
                      formControlName="endTimeValue"
                    >
                    </cats-ui-input>
                  </div>
                </div>
              }
            </div>
          </div>

          <!-- Frequency Field -->
          <div class="row_div d-flex align-items-center">
            <label for="frequency">
              Frequency <sup class="red">*</sup>
            </label>
            <div class="d-flex gap-8px flex-fill">
              <div class="w-50">
                <cats-ui-input
                  id="frequency"
                  [inputConfig]="inputConfig"
                  required
                  formControlName="frequency"
                >
                </cats-ui-input>
              </div>
              <div class="w-50">
                <cats-ui-single-select
                  [optionList]="frequencyTypeOptions"
                  [singleSelectConfig]="singleConfig"
                  formControlName="frequencyType"
                >
                </cats-ui-single-select>
              </div>
            </div>
          </div>
        </div>

        <!-- Vertical Divider -->
        <div class="vertical_line"></div>

        <!-- Right Side -->
        <div class="right_side">
          <!-- Reference Point Field -->
          <div class="row_div d-flex align-items-center">
            <label for="referencePoint">
              Reference Point <sup class="red">*</sup>
            </label>
            <div class="flex-fill">
              <cats-ui-single-select
                id="referencePoint"
                [optionList]="referencePointOptions"
                [singleSelectConfig]="singleConfig"
                formControlName="referencePoint"
              >
              </cats-ui-single-select>
            </div>
          </div>

          <!-- Notify on Changes Field -->
          <div class="row_div d-flex align-items-center">
            <label for="notifyCheckbox">
              Notify on Changes <sup class="red">*</sup>
            </label>
            <div class="check_btn flex-fill">
              <cats-ui-checkbox-button
                id="notifyCheckbox"
                [checkBoxConfig]="checkBoxConfig"
                [optionList]="taskOptions"
                (onCheckBoxSelection)="checkBox($event)"
              >
              </cats-ui-checkbox-button>
            </div>
          </div>

          <!-- Conditional Email Address Field -->
          @if (notifyChecked) {
            <div class="row_div d-flex align-items-center">
              <label for="emailAddresses">
                Email Address <sup class="red">*</sup>
              </label>
              <div class="check_btn flex-fill">
                <cats-ui-input-multi-select
                  id="emailAddresses"
                  [optionsList]="emailOptions"
                  [autoCompleteMultiSelectConfig]="autoMultiSelectConfig"
                  formControlName="emailAddresses"
                >
                </cats-ui-input-multi-select>
              </div>
            </div>
          }
        </div>
      </form>
    </div>

    <!-- Footer Section -->
    <div class="modal_footer">
      <div class="w-100 footer_space">
        <button
          type="button"
          class="btn btn_border"
          aria-label="Go back to previous step"
        >
          Back
        </button>
        <div class="twis_btn">
          <button
            type="button"
            class="btn btn_clear"
            (click)="clearForm()"
            aria-label="Clear all form information"
          >
            Clear Info
          </button>
          <button
            type="button"
            class="btn btn_blue"
            [disabled]="schedulerDetailsForm.invalid"
            (click)="goNext()"
            aria-label="Proceed to next step"
          >
            Next
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
